name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev lld openjdk-17-jdk shared-mime-info unzip zip autoconf libtool pkg-config zlib1g-dev libffi-dev libssl-dev expect
        python3 -m pip install --upgrade pip
        python3 -m pip install buildozer cython==0.29.33 kivy

    - name: Pre-Accept All Android Licenses Automatically
      run: |
        # Buildozer ke liye pehle se hi platform folders bana rahe hain
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        
        # Ek fake yes-man terminal script jo piche se har request par 'y' bhejta rahega
        mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin
        
        # Environment variables inject kar rahe hain jo tools ko force karenge
        echo "y" | dpkg --configure -a

    - name: Build Android APK with Buildozer
      env:
        AUTO_ACCEPT_AND_SDK_LICENSES: "1"
        GRADLE_OPTS: "-Dorg.gradle.daemon=false"
      run: |
        # Is command ke sath yeh har puchhe gaye sawaal par automatic YES dabata jayega
        yes | buildozer -v android debug
        
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Guess-King-APK
        path: bin/*.apk
