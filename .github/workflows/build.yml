name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get install -y -q libsqlite3-dev lld openjdk-17-jdk shared-mime-info unzip zip autoconf libtool pkg-config zlib1g-dev libffi-dev libssl-dev
        python3 -m pip install --upgrade pip
        python3 -m pip install buildozer cython==0.29.33 kivy

    - name: Build Android APK with Buildozer
      env:
        AUTO_ACCEPT_AND_SDK_LICENSES: "1"
      run: |
        mkdir -p ~/.android
        echo "count=0" > ~/.android/repositories.cfg
        yes | buildozer -v android debug
        
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Guess-King-APK
        path: bin/*.apk
