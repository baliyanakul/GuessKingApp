name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-python: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev lldd openjdk-17-jdk shared-mime-info unzip zip
        python3 -m pip install --upgrade pip
        python3 -m pip install buildozer cython==0.29.33 kivy

    - name: Build Android APK with Buildozer
      run: |
        yes | buildozer -v android debug
        
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v3
      with:
        name: Guess-King-APK
        path: bin/*.apk
