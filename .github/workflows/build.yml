name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev lld openjdk-17-jdk shared-mime-info unzip zip autoconf libtool pkg-config zlib1g-dev libffi-dev libssl-dev
        python3 -m pip install --upgrade pip
        python3 -m pip install buildozer cython==0.29.33 kivy

    - name: Pre-accept Android SDK Licenses
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip -d cmdline-tools
        mkdir -p sdk/cmdline-tools
        mv cmdline-tools/cmdline-tools sdk/cmdline-tools/latest
        yes | sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/android-sdk --licenses || true

    - name: Build Android APK with Buildozer
      run: |
        buildozer -v android debug
        
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Guess-King-APK
        path: bin/*.apk
